<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>better-chatbot</title>
    <meta
      name="description"
      content="Better Chatbot is a chatbot that uses the Tools to answer questions."
    />
    <script>
      ;(() => {
        try {
          const t = localStorage.getItem('app-theme-v2') || 'system'
          const dark =
            t === 'dark' ||
            (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.add(dark ? 'dark' : 'light')
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch {}
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
